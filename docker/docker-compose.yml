name: ser-demo

# Usage:
#   bash certs/generate-certs.sh        # one-time: generate dev TLS certificates
#   docker compose build                # build images (tagged below for registry publishing)
#   docker compose up
#   -> http://localhost:8888/lab?token=ser-demo  open work/ser_demo_notebook.ipynb
#
# The notebook reads FTPS_HOST, FTPS_PORT, FTPS_USER, FTPS_PASSWORD, REMOTE_PATH
# and CERT_DIR from environment - no manual edits to the notebook are needed.

services:

  jupyter:
    build:
      context: ../..
      dockerfile: ser-client-api/docker/jupyter/Dockerfile
    image: ser-demo-jupyter:0.6.0
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: ser-demo
      FTPS_HOST: proftpd
      FTPS_PORT: "990"
      FTPS_USER: CHU-TEST
      FTPS_PASSWORD: ftppassword
      REMOTE_PATH: remote/seqoia
      CERT_DIR: /certs
    volumes:
      - ./certs:/certs:ro
      - ../docs:/home/jovyan/work
    networks: [ser-net]
    depends_on:
      - proftpd
      - appserver
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  proftpd:
    build:
      context: ../../ser_server-ftps/proftpd-ftps
    image: ser-demo-proftpd:latest
    volumes:
      - ./certs/ca-cert.pem:/etc/proftpd/ssl/cacert.pem:ro
      - ./certs/server.crt:/etc/proftpd/ssl/proftpd.crt:ro
      - ./certs/server.key:/etc/proftpd/ssl/proftpd.key:ro
      - ./proftpd/proftpd.conf:/etc/proftpd/proftpd.conf:ro
      - ftpdata:/home/CHU-TEST
    ports:
      - "9990:990"
      - "39000-39009:30000-30009"
    networks: [ser-net]
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'

  appserver:
    build:
      context: ../../ser_server-ftps/appserver
    image: ser-demo-appserver:latest
    entrypoint: ["/bin/bash", "-c", "mkdir -p /tasks/remote && chmod 777 /tasks/remote && exec /run/entrypoint.sh"]
    environment:
      RMQ_HOST: rabbitmq
      RMQ_USER: user
      RMQ_PASS: password
      RMQ_QUEUE: chu_files
    volumes:
      - ftpdata:/tasks
    networks: [ser-net]
    depends_on:
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [ser-net]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M

  # TODO
  # audit-db:
  #   image: postgres:17
  #   environment:
  #     POSTGRES_USER: audit
  #     POSTGRES_PASSWORD: password
  #   volumes:
  #     - auditdata:/var/lib/postgresql/data
  #   networks: [ser-net]
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #         cpus: '0.5'

volumes:
  ftpdata:
  # auditdata:

networks:
  ser-net:
    driver: bridge
